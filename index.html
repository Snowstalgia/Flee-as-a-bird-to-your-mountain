<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>你当像鸟飞回这座山</title>
    <style>
        @font-face {
            font-family: "XiangCuiKeSong";
            src: url("xiangcuikesong.ttf") format("truetype");
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: "XiangCuiKeSong", "PingFang SC", "Microsoft YaHei", sans-serif;
            cursor: url('images/光标_48.png') 8 0, auto;
        }

        /* ===== 序幕场景 ===== */
        #scene-prologue {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 1;
        }

        #video-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        #video-wrapper {
            position: relative;
            width: 100%; height: 100%;
        }

        #video-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
        }

        #video-word {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            mix-blend-mode: multiply;
            pointer-events: none;
            opacity: 1;
            transition: opacity 1.5s ease;
        }

        #video-word.fade-out {
            opacity: 0;
        }

        #btn-start {
            position: absolute;
            bottom: 6%;
            left: 6%;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.2s ease-in-out;
            z-index: 10;
        }

        #btn-start.show {
            opacity: 1;
            visibility: visible;
        }

        #btn-start.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        #btn-start img {
            width: 140px;
            height: auto;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.5));
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        #btn-start:hover img {
            transform: scale(1.08);
            filter: drop-shadow(0 4px 16px rgba(0, 0, 0, 0.7));
        }

        #btn-start:active img {
            transform: scale(0.96);
        }

        /* ===== 章节标题（通用） ===== */
        #chapter-title {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s ease;
            background: transparent;
        }

        #chapter-title.show {
            opacity: 1;
        }

        #chapter-title.fade-out {
            opacity: 0;
        }

        #chapter-title span {
            font-family: "XiangCuiKeSong", serif;
            font-size: 8rem;
            color: #fff;
            letter-spacing: 0.5em;
            text-indent: 0.5em;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.6);
        }

        /* ===== 序章场景播放器 ===== */
        #scene-chapter {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 2;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.5s ease;
        }

        #scene-chapter.active {
            opacity: 1;
            visibility: visible;
        }

        #scene-chapter video,
        #scene-chapter > img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #scene-image {
            display: none;
            position: absolute;
            top: 0; left: 0;
        }

        #scene-image.cover {
            object-fit: cover;
        }

        #scene-image.is-zoom-in {
            animation: sceneImageZoomIn 0.85s ease forwards;
            transform-origin: center center;
        }

        @keyframes sceneImageZoomIn {
            from {
                transform: scale(1);
            }
            to {
                transform: scale(1.14);
            }
        }

        /* ===== 叠加图层 ===== */
        #scene-overlay {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: auto;
            height: 45%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 1.5s ease;
            z-index: 5;
            pointer-events: none;
            display: none;
        }

        #scene-overlay.show {
            opacity: 1;
        }

        #scene-ui-layer {
            position: absolute;
            inset: 0;
            z-index: 11;
            pointer-events: none;
            display: none;
        }

        #scene-ui-layer.show {
            display: block;
        }

        .scene-ui-group {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .scene-ui-group.is-centered {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            flex-direction: column;
            padding: 0 8vw;
        }

        .scene-ui-button {
            pointer-events: auto;
            border: 1px solid rgba(99, 70, 30, 0.18);
            background: rgba(255, 248, 236, 0.92);
            color: #5e4726;
            border-radius: 999px;
            font-family: "XiangCuiKeSong", serif;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
        }

        .scene-ui-button:hover {
            transform: translateY(-1px);
            background: rgba(255, 252, 245, 0.98);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
        }

        .scene-ui-button.is-choice {
            min-width: min(56vw, 420px);
            padding: 0.85rem 1.5rem;
            font-size: 1rem;
            line-height: 1.45;
        }

        .scene-ui-group.is-bookshelf {
            position: absolute;
            inset: 0;
        }

        .scene-ui-group.is-fullscreen {
            position: absolute;
            inset: 0;
        }

        .scene-ui-button.is-book-hotspot {
            position: absolute;
            top: 28%;
            left: 45.2%;
            width: 8.2%;
            height: 42%;
            transform: translate(-50%, 0) rotate(-7deg);
            border: none;
            border-radius: 0.3rem;
            background: transparent;
            box-shadow: none;
            color: transparent;
        }

        .scene-ui-button.is-book-hotspot:hover {
            transform: translate(-50%, 0) rotate(-7deg);
            background: transparent;
            box-shadow: none;
        }

        .scene-ui-button.is-fullscreen-hotspot {
            position: absolute;
            inset: 0;
            border: none;
            border-radius: 0;
            background: transparent;
            box-shadow: none;
        }

        .scene-ui-button.is-fullscreen-hotspot:hover {
            transform: none;
            background: transparent;
            box-shadow: none;
        }

        /* ===== 对话层 ===== */
        #dialogue-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 45%;
            display: flex;
            align-items: flex-end;
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
            z-index: 10;
        }

        #dialogue-layer.show {
            opacity: 1;
            pointer-events: auto;
        }

        #dialogue-portrait {
            height: 90%;
            width: auto;
            object-fit: contain;
            flex-shrink: 0;
            margin-left: 2%;
        }

        #dialogue-box {
            position: relative;
            flex: 1;
            height: 55%;
            margin-right: 2%;
            margin-bottom: 2%;
        }

        #dialogue-bg {
            width: 100%;
            height: 100%;
            object-fit: fill;
            border-radius: 4px;
        }

        #dialogue-text {
            position: absolute;
            top: 18%;
            left: 6%;
            right: 6%;
            bottom: 12%;
            font-family: "XiangCuiKeSong", serif;
            font-size: 1.6rem;
            color: #3a2e1a;
            line-height: 1.8;
            overflow: hidden;
            display: flex;
            gap: 0.6em;
        }

        .dialogue-name {
            flex-shrink: 0;
            white-space: nowrap;
        }

        .dialogue-content {
            flex: 1;
        }

        /* ===== 旁白文字层 ===== */
        #narration-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10% 15%;
            font-family: "XiangCuiKeSong", serif;
            font-size: 1.8rem;
            color: #fff;
            line-height: 2.2;
            text-align: center;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.8);
            opacity: 0;
            transition: opacity 1.5s ease;
            pointer-events: none;
            z-index: 10;
        }

        #narration-overlay.show {
            opacity: 1;
        }

        /* ===== 点击开始提示 ===== */
        #tap-to-start {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            cursor: pointer;
        }

        #tap-to-start span {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.2rem;
            letter-spacing: 0.3em;
            animation: breathe 2.5s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .fade-out-overlay {
            animation: fadeOutOverlay 1s ease forwards;
        }

        @keyframes fadeOutOverlay {
            to { opacity: 0; visibility: hidden; }
        }

        .puzzle-panel {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .puzzle-response {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding-right: 0.35rem;
            white-space: pre-line;
            font-size: 1.15rem;
            line-height: 1.8;
        }

        .puzzle-response.typing {
            cursor: pointer;
        }

        .puzzle-response-image {
            display: block;
            max-width: 100%;
            max-height: 180px;
            margin: 0 auto 0.75rem;
            object-fit: contain;
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
        }

        .puzzle-response-image.is-book-cover {
            max-height: 220px;
            box-shadow: none;
        }

        .puzzle-response-image.is-page {
            width: 100%;
            max-height: 240px;
            border-radius: 10px;
            background: rgba(255, 250, 242, 0.48);
        }

        .puzzle-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .puzzle-action {
            border: 1px solid rgba(99, 70, 30, 0.18);
            background: rgba(255, 248, 236, 0.86);
            color: #5e4726;
            padding: 0.4rem 0.85rem;
            border-radius: 999px;
            font-family: inherit;
            font-size: 0.88rem;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease;
        }

        .puzzle-action:hover:not(:disabled) {
            transform: translateY(-1px);
            background: rgba(255, 252, 245, 0.98);
        }

        .puzzle-controls {
            display: flex;
            gap: 0.7rem;
            align-items: stretch;
        }

        .puzzle-input {
            flex: 1;
            min-width: 0;
            border: 1px solid rgba(99, 70, 30, 0.24);
            border-radius: 10px;
            padding: 0.75rem 0.9rem;
            font-family: inherit;
            font-size: 0.9rem;
            color: #4b371d;
            background: rgba(255, 252, 245, 0.94);
            outline: none;
        }

        .puzzle-input:focus {
            border-color: rgba(99, 70, 30, 0.48);
            box-shadow: 0 0 0 3px rgba(175, 137, 84, 0.14);
        }

        .puzzle-submit {
            border: none;
            border-radius: 10px;
            padding: 0 1.2rem;
            background: #6d4f26;
            color: #fff7eb;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            white-space: nowrap;
        }

        .puzzle-submit:disabled,
        .puzzle-action:disabled,
        .puzzle-input:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        #scene-overlay.puzzle-lock-overlay {
            top: 17%;
            right: 15%;
            bottom: auto;
            left: auto;
            transform: none;
            width: min(18vw, 152px);
            height: auto;
            filter: drop-shadow(0 10px 22px rgba(0, 0, 0, 0.2));
        }

        @media (max-width: 768px) {
            .puzzle-controls {
                flex-direction: column;
            }

            .puzzle-submit {
                min-height: 44px;
            }

            .scene-ui-button.is-choice {
                min-width: 72vw;
                font-size: 0.92rem;
            }

            .scene-ui-button.is-book-hotspot {
                top: 30%;
                left: 46%;
                width: 11.5%;
                height: 38%;
            }
        }
    </style>
</head>
<body>

    <div id="tap-to-start">
        <span>点击屏幕开始</span>
    </div>

    <!-- 序幕：背景视频 + 文字视频 + 开始按钮 -->
    <div id="scene-prologue">
        <div id="video-container">
            <div id="video-wrapper">
                <video id="video-bg" muted playsinline preload="auto" loop>
                    <source src="videos/0.mp4" type="video/mp4">
                </video>
                <video id="video-word" muted playsinline preload="auto">
                    <source src="videos/0_word.mp4" type="video/mp4">
                </video>
            </div>
        </div>
        <div id="btn-start">
            <img src="images/初始画面-开始按键.png" alt="开始">
        </div>
    </div>

    <!-- 章节标题（浮在所有场景之上） -->
    <div id="chapter-title">
        <span>序章</span>
    </div>

    <!-- 序章场景：依次播放过场视频 -->
    <div id="scene-chapter">
        <video id="video-scene" muted playsinline preload="auto">
        </video>
        <img id="scene-image" src="" alt="">
        <!-- 对话层 -->
        <div id="dialogue-layer">
            <img id="dialogue-portrait" src="images/主控半身.png" alt="">
            <div id="dialogue-box">
                <img id="dialogue-bg" src="images/对话框_当代.png" alt="">
                <div id="dialogue-text"></div>
            </div>
        </div>
        <!-- 旁白文字层 -->
        <div id="narration-overlay"></div>
        <!-- 叠加图层（捧香等） -->
        <img id="scene-overlay" src="" alt="">
        <div id="scene-ui-layer"></div>
    </div>

    <script>
        (function () {
            var tapOverlay = document.getElementById('tap-to-start');
            var scenePrologue = document.getElementById('scene-prologue');
            var videoBg = document.getElementById('video-bg');
            var videoWord = document.getElementById('video-word');
            var btnStart = document.getElementById('btn-start');
            var chapterTitle = document.getElementById('chapter-title');
            var sceneChapter = document.getElementById('scene-chapter');
            var videoScene = document.getElementById('video-scene');
            var sceneImage = document.getElementById('scene-image');
            var dialogueLayer = document.getElementById('dialogue-layer');
            var dialoguePortrait = document.getElementById('dialogue-portrait');
            var dialogueText = document.getElementById('dialogue-text');
            var narrationOverlay = document.getElementById('narration-overlay');
            var sceneOverlay = document.getElementById('scene-overlay');
            var sceneUiLayer = document.getElementById('scene-ui-layer');

            var narrationActive = false;

            // 对话队列
            var dialogueLines = [
                '父亲 【娃娃你回来了！】',
                '弟弟 【姐姐！】',
                '我 【你啊，不见半年，又窜高了这么大一截。】'
            ];
            var dialogueIndex = 0;
            var isTyping = false;
            var typeTimer = null;
            var currentFullText = '';
            var dialogueActive = false;
            var onDialogueEnd = null;
            var onLineShow = null;
            var introStage = 'tap';
            var imageAssetRoot = 'images/';
            var videoAssetRoot = 'videos/';

            // 序章的过场队列（支持视频和图片）
            var sceneItems = [
                { type: 'video', src: '1.mp4' },
                { type: 'video', src: '2.mp4' },
                { type: 'video', src: '3.mp4' },
                { type: 'image', src: '序章-主控的父亲和弟弟骑三轮车来接.png', duration: 3000 }
            ];
            var currentSceneIndex = 0;

            function resolveImageAsset(src) {
                if (!src) return '';
                if (/^(?:https?:|data:|blob:|images\/)/i.test(src)) {
                    return src;
                }
                return imageAssetRoot + src.replace(/^\.?[\\/]+/, '');
            }

            function resolveVideoAsset(src) {
                if (!src) return '';
                if (/^(?:https?:|data:|blob:|videos\/)/i.test(src)) {
                    return src;
                }
                return videoAssetRoot + src.replace(/^\.?[\\/]+/, '');
            }

            function finishMainMenuIntro() {
                if (introStage !== 'menu') return;

                introStage = 'menu-ready';
                videoWord.pause();
                try {
                    if (isFinite(videoWord.duration) && videoWord.duration > 0) {
                        videoWord.currentTime = videoWord.duration;
                    }
                } catch (error) {}
                btnStart.classList.add('show');
            }

            function enterMainMenu() {
                if (introStage !== 'tap') return;

                introStage = 'menu';
                tapOverlay.classList.add('fade-out-overlay');
                setTimeout(function () {
                    tapOverlay.style.display = 'none';
                }, 1000);

                btnStart.classList.remove('show');
                btnStart.classList.remove('fade-out');
                videoWord.classList.remove('fade-out');
                videoWord.pause();
                videoWord.currentTime = 0;
                videoBg.currentTime = 0;
                videoBg.play().catch(function (e) {
                    console.warn('背景视频播放失败:', e);
                });
                videoWord.play().catch(function (e) {
                    console.warn('标题视频播放失败:', e);
                });
            }

            // ---- 文字视频播完 → 出现开始按钮 ----
            videoWord.addEventListener('ended', function () {
                finishMainMenuIntro();
            });

            // ---- 点击开始 → 淡出 → 显示"序章" → 播放过场 ----
            btnStart.addEventListener('click', function (event) {
                event.stopPropagation();
                if (introStage !== 'menu-ready') return;

                introStage = 'playing';
                videoWord.classList.add('fade-out');
                btnStart.classList.add('fade-out');

                // 1.5s后 "序章"淡入
                setTimeout(function () {
                    chapterTitle.classList.add('show');
                }, 1500);

                // 3.5s后 "序章"淡出，同时切到过场视频
                setTimeout(function () {
                    chapterTitle.classList.add('fade-out');
                    startSceneVideos();
                }, 5000);
            });

            // ---- 过场播放系统（支持视频和图片） ----
            function startSceneVideos() {
                currentSceneIndex = 0;
                playSceneItem(sceneItems[currentSceneIndex]);
            }

            function playSceneItem(item) {
                sceneChapter.classList.add('active');
                if (item.type === 'video') {
                    sceneImage.style.display = 'none';
                    videoScene.style.display = '';
                    videoScene.src = resolveVideoAsset(item.src);
                    videoScene.load();
                    videoScene.play().catch(function (e) {
                        console.warn('过场视频播放失败:', e);
                    });
                } else if (item.type === 'image') {
                    videoScene.pause();
                    videoScene.style.display = 'none';
                    sceneImage.src = resolveImageAsset(item.src);
                    sceneImage.style.display = 'block';
                    setTimeout(function () {
                        onDialogueEnd = function () {
                            // 序章对话结束 → 黑幕 → 播放5.mp4
                            dialogueLayer.classList.remove('show');
                            setTimeout(function () {
                                sceneImage.style.display = 'none';
                                setTimeout(function () {
                                    videoScene.style.display = '';
                                    videoScene.src = resolveVideoAsset('5.mp4');
                                    videoScene.load();
                                    videoScene.play().catch(function (e) {
                                        console.warn('5.mp4播放失败:', e);
                                    });
                                }, 1500);
                            }, 800);
                        };
                        startDialogue();
                    }, item.duration);
                }
            }

            function advanceScene() {
                currentSceneIndex++;
                if (currentSceneIndex < sceneItems.length) {
                    playSceneItem(sceneItems[currentSceneIndex]);
                } else {
                    console.log('序章过场全部播放完毕');
                }
            }

            function endCurrentVideo() {
                if (videoScene.src.indexOf('5.mp4') !== -1) {
                    showNarrationScene();
                } else {
                    advanceScene();
                }
            }

            videoScene.addEventListener('ended', function () {
                endCurrentVideo();
            });

            // ---- 旁白场景 ----
            function showNarrationScene() {
                videoScene.pause();
                videoScene.style.display = 'none';
                sceneImage.style.display = 'none';
                var newImg = new Image();
                newImg.onload = function () {
                    sceneImage.src = newImg.src;
                    sceneImage.style.display = 'block';
                    narrationOverlay.textContent = '熟悉的温暖将你包裹其中，父母、弟弟的笑脸、厨房里飘出的香气、写着\u201c福\u201d字的灯笼、精美繁复的窗花……一切似乎都与过去一模一样。';
                    setTimeout(function () {
                        narrationOverlay.classList.add('show');
                        narrationActive = true;
                    }, 500);
                };
                newImg.src = resolveImageAsset('序章-主控家里-旁边底图.png');
            }

            // ---- 第一章场景 ----
            function startChapter1() {
                narrationActive = false;
                narrationOverlay.classList.remove('show');
                sceneImage.style.display = 'none';
                // 预加载灵位图
                var lingweiImg = new Image();
                lingweiImg.onload = function () {
                    sceneImage.src = lingweiImg.src;
                    sceneImage.classList.add('cover');
                    sceneImage.style.display = 'block';
                    // 3秒后淡入捧香
                    var xiangImg = new Image();
                    xiangImg.onload = function () {
                        setTimeout(function () {
                            sceneOverlay.src = xiangImg.src;
                            sceneOverlay.style.display = 'block';
                            requestAnimationFrame(function () {
                                sceneOverlay.classList.add('show');
                            });
                            // 捧香淡入后停留3秒，再出对话
                            setTimeout(function () {
                                dialogueLines = ['我 【爷爷……】'];
                                onDialogueEnd = function () {
                                    // 第一章灵位对话结束 → 视频通话场景
                                    startVideoCallScene();
                                };
                                startDialogue();
                            }, 3000);
                        }, 3000);
                    };
                    xiangImg.src = resolveImageAsset('第一章-主控捧香.png');
                };
                lingweiImg.src = resolveImageAsset('第一章-祖父灵位大特写.png');
            }

            // ---- 视频通话场景 ----
            function startVideoCallScene() {
                // 隐藏对话层和叠加图
                dialogueLayer.classList.remove('show');

            function escapeHtml(text) {
                return String(text || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function stripPuzzleDialogueQuotes(text) {
                return String(text || '')
                    .replace(/^[「“]+/, '')
                    .replace(/[」”]+$/, '');
            }

            function parsePuzzleLine(line) {
                var trimmed = String(line || '').trim();
                if (!trimmed) {
                    return {
                        speaker: '',
                        text: '',
                        spoken: false
                    };
                }

                trimmed = trimmed
                    .replace(/【主控】/g, '【我】')
                    .replace(/主控/g, '我');

                var match = trimmed.match(/^([^：\n]+)：(.+)$/);
                if (match) {
                    return {
                        speaker: match[1].trim(),
                        text: match[1].trim() + '：' + stripPuzzleDialogueQuotes(match[2].trim()),
                        spoken: true
                    };
                }

                match = trimmed.match(/^【([^】]+)】\s*(.+)$/);
                if (!match) {
                    match = trimmed.match(/^([^【\n：]+?)\s*【(.+)】$/);
                }

                if (match) {
                    return {
                        speaker: match[1],
                        text: match[1] + '：' + stripPuzzleDialogueQuotes(match[2]),
                        spoken: true
                    };
                }

                return {
                    speaker: '',
                    text: trimmed.replace(/[【】]/g, ''),
                    spoken: false
                };
            }

            function normalizePuzzleText(text) {
                return String(text || '')
                    .split('\n')
                    .map(function (line) {
                        return parsePuzzleLine(line).text;
                    })
                    .join('\n');
            }

            function analyzePuzzleText(text) {
                var hasVisibleText = false;
                var showPortrait = false;

                String(text || '').split('\n').forEach(function (line) {
                    var parsed = parsePuzzleLine(line);
                    if (!parsed.text) return;

                    hasVisibleText = true;
                    if (parsed.speaker === '我') {
                        showPortrait = true;
                    }
                });

                return {
                    hasVisibleText: hasVisibleText,
                    showPortrait: showPortrait
                };
            }

                var box = document.getElementById('dialogue-text');
                box.style.overflowY = 'auto';
                box.style.gap = '0';
                var storyMeta = analyzePuzzleText(options && options.text ? options.text : '');

                if (storyMeta.hasVisibleText) {
                    dialogueLayer.classList.add('show');
                    box.style.display = 'block';
                    box.innerHTML = `
                        <div class="puzzle-panel">
                            <div id="puzzle-response" class="puzzle-response"></div>
                            ${options.actions && options.actions.length ? '<div id="puzzle-actions" class="puzzle-actions">' + renderPanelActions(options.actions, 'data-panel-action') + '</div>' : ''}
                        </div>
                    `;

                    if (options.actions && options.actions.length) {
                        bindPanelActions(options.actions, 'data-panel-action');
                    }

                    typePanelScene(options);
                } else {
                    dialogueLayer.classList.remove('show');
                    dialoguePortrait.style.display = 'none';
                    box.style.display = 'none';
                    box.innerHTML = '';
                    if (options && options.image) {
                        showPuzzleSceneImage(options.image, !!options.useCover, options.imageClass || '');
                    }
                    if (options && typeof options.onAdvance === 'function' && (!options.sceneActions || !options.sceneActions.length)) {
                        showSceneUi([
                            {
                                label: '',
                                className: 'is-fullscreen-hotspot',
                                onClick: function () {
                                    var next = puzzleAdvanceHandler;
                                    puzzleAdvanceHandler = null;
                                    if (typeof next === 'function') {
                                        next();
                                    }
                                }
                            }
                        ], 'is-fullscreen');
                    }
                }

                if (options.sceneActions && options.sceneActions.length) {
                    showSceneUi(options.sceneActions, options.sceneActionsClass);
                }
            }

            function unlockNotebook() {
                renderStoryPanel({
                    image: '第一章-锁特写.png',
                    text: '【我】我就知道……',
                    onAdvance: function () {
                        startNotebookPage(0);
                    }
                });
            }

            function startNotebookPage(index) {
                var page = notebookPages[index];
                if (!page) {
                    finishNotebookSequence();
                    return;
                }

                renderStoryPanel({
                    image: page.image,
                    imageClass: page.imageClass || '',
                    text: page.sceneText || '',
                    onAdvance: function () {
                        if (index + 1 < notebookPages.length) {
                            startNotebookPage(index + 1);
                            return;
                        }
                        finishNotebookSequence();
                    }
                });
            }

            function finishNotebookSequence() {
                stopPuzzleTyping();
                puzzleAdvanceHandler = null;
                clearSceneUi();
            }

            function bindPuzzleEvents() {
                var elements = getPuzzleElements();
                if (!elements.input || !elements.submit) return;

                elements.submit.onclick = function (event) {
                    event.stopPropagation();
                    submitPuzzle();
                };

                elements.input.onkeydown = function (event) {
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        event.stopPropagation();
                        submitPuzzle();
                    }
                };

            }

            function startPuzzle() {
                dialogueActive = false;
                puzzleState = {};
                puzzlePending = false;
                stopPuzzleTyping();
                clearSceneUi();
                rememberPuzzleSceneSnapshot();
                dialogueLayer.classList.add('show');

                var box = document.getElementById('dialogue-text');
                box.style.display = 'block';
                box.style.overflowY = 'auto';
                box.style.gap = '0';
                box.innerHTML = `
                    <div class="puzzle-panel">
                        <div id="puzzle-response" class="puzzle-response"></div>
                        <div class="puzzle-controls">
                            <input id="puzzle-input" class="puzzle-input" type="text" autocomplete="off" placeholder="比如：我要调查书柜">
                            <button id="puzzle-btn" class="puzzle-submit" type="button">调查</button>
                        </div>
                    </div>
                `;

                bindPuzzleEvents();
                typePuzzleResponse(puzzleIntroText);

                var input = document.getElementById('puzzle-input');
                if (input) {
                    input.focus();
                }
            }

            function submitPuzzle(forcedInput) {
                if (puzzlePending) return;

                var elements = getPuzzleElements();
                if (!elements.input) return;

                var input = (typeof forcedInput === 'string' ? forcedInput : elements.input.value).trim();
                if (!input) {
                    elements.input.focus();
                    return;
                }

                puzzleLastInput = input;
                elements.input.value = input;
                puzzlePending = true;
                setPuzzleControlsDisabled(true);

                fetch(puzzleEndpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        input: input,
                        state: puzzleState
                    })
                })
                .then(function (response) {
                    if (!response.ok) {
                        throw new Error('HTTP ' + response.status);
                    }
                    return response.json();
                })
                .then(function (data) {
                    if (data && data.state && typeof data.state === 'object') {
                        Object.keys(data.state).forEach(function (key) {
                            puzzleState[key] = data.state[key];
                        });
                    }
                    handlePuzzleResponse(data || {});
                })
                .catch(function (error) {
                    console.error('Puzzle request failed:', error);
                    typePuzzleResponse('调查没有连上服务器，请稍后再试。');
                })
                .finally(function () {
                    puzzlePending = false;
                    setPuzzleControlsDisabled(false);
                });
            }

            function handlePuzzleResponse(data) {
                if (data.type === 'success') {
                    setPuzzleControlsDisabled(true);
                    setTimeout(function () {
                        startBookshelfDiscoveryScene();
                    }, 300);
                    return;
                }

                renderPuzzleResponse(data);
            }
        })();
    </script>
